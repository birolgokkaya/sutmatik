</style></head><body><main class="app"><div class="title"><h1>🍼 Sütmatik</h1></div><section class="card login-card" id="loginCard"><div class="field"><label for="email">E-posta</label><input id="email" type="email" autocomplete="email"></div><div class="field"><label for="password">Şifre</label><input id="password" type="password" autocomplete="current-password"></div><button class="ok" id="loginBtn">Giriş yap</button></section><section class="card main-card" id="mainCard"><div class="userbar"><span id="userEmail">—</span><button class="logout" id="logoutBtn">Çıkış</button></div><div class="dose-row"><label for="dose">Enjektör ml</label><select id="dose"><option value="1">1 ml</option><option value="2">2 ml</option><option value="3">3 ml</option><option value="4">4 ml</option><option value="5" selected>5 ml</option><option value="6">6 ml</option><option value="7">7 ml</option><option value="8">8 ml</option><option value="9">9 ml</option><option value="10">10 ml</option></select></div><div class="stats"><div class="stat"><div class="label">Enjektör</div><div class="value" id="count">0</div></div><div class="stat"><div class="label">Son işlem</div><div class="value" id="last">—</div></div></div><div class="big"><div id="total">0</div><div class="unit">ml toplam süt</div></div><button class="primary" id="addBtn">+ 1 enjektör verdim</button><div class="row"><button class="secondary small" id="undoBtn">Geri al</button><button class="danger small" id="resetBtn">Sıfırla</button></div><div class="row"><button class="ok small" id="saveBtn">Öğünü kaydet</button><button class="secondary small" id="clearBtn">Tüm geçmişi sil</button></div><div class="history"><div class="history-header"><div class="history-title">Kayıtlar</div><button class="add-manual" id="manualBtn">+</button></div><div id="history"><div class="history-empty">Henüz kayıt yok.</div></div></div></section></main><div class="modal-backdrop" id="noteModal"><div class="modal"><div class="modal-title">Öğün açıklaması function pad(n){return String(n).padStart(2,"0")}function isoDay(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}function displayTime(d){return pad(d.getHours())+":"+pad(d.getMinutes())}function displayDay(k){const p=k.split("-");return p[2]+"."+p[1]+"."+p[0]}function totalMl(){return Math.round(state.count*state.doseMl*100)/100}function esc(t){return String(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#039;")}function toast(m){toastEl.innerText=m;toastEl.className="toast show";setTimeout(()=>toastEl.className="toast",1400)}function saveLocal(){localStorage.setItem("sutmatik_local_counter",JSON.stringify({doseMl:state.doseMl,count:state.count,lastTime:state.lastTime}))}function loadLocal(){try{const s=JSON.parse(localStorage.getItem("sutmatik_local_counter"));if(s){state.doseMl=Number(s.doseMl)||5;state.count=Number(s.count)||0;state.lastTime=s.lastTime||""}}catch{}doseEl.value=String(state.doseMl)}
function render(){countEl.innerText=state.count;totalEl.innerText=totalMl();lastEl.innerText=state.lastTime||"—";if(!state.history.length){historyEl.innerHTML='<div class="history-empty">Henüz kayıt yok.</div>';return}const groups={};state.history.forEach(i=>{if(!groups[i.dayKey])groups[i.dayKey]=[];groups[i.dayKey].push(i)});historyEl.innerHTML="";Object.keys(groups).sort().reverse().forEach((key,idx)=>{if(collapsedDays[key]===undefined)collapsedDays[key]=idx!==0;const items=groups[key].slice().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));const dayTotal=Math.round(items.reduce((s,x)=>s+(Number(x.ml)||0),0)*100)/100;const group=document.createElement("div");group.className="day-group";const head=document.createElement("div");head.className="day-head";const left=document.createElement("div");left.className="day-left";const toggle=document.createElement("button");toggle.className="toggle-day";toggle.innerText=collapsedDays[key]?"＋":"−";toggle.onclick=()=>{collapsedDays[key]=!collapsedDays[key];render()};const dn=document.createElement("div");dn.className="day-date";dn.innerText=displayDay(key);left.append(toggle,dn);const total=document.createElement("div");total.className="day-total";total.innerText=dayTotal+" ml";head.append(left,total);group.appendChild(head);const wrap=document.createElement("div");wrap.className=collapsedDays[key]?"day-items collapsed":"day-items";items.forEach(item=>{const row=document.createElement("div");row.className="history-item";const text=document.createElement("div");text.className="history-text";const note=item.note?'<div class="history-note">📝 '+esc(item.note)+"</div>":"";text.innerHTML="<b>"+item.ml+" ml</b><br>"+esc(item.time+" — "+item.count+" enjektör x "+item.doseMl+" ml = "+item.ml+" ml")+note;const btn=document.createElement("button");btn.className="delete-one";btn.innerText="Sil";btn.onclick=()=>del(item.id);row.append(text,btn);wrap.appendChild(row)});group.appendChild(wrap);historyEl.appendChild(group)})}
function listen(){if(unsub)unsub();unsub=onSnapshot(query(recordsRef,orderBy("createdAt","desc")),snap=>{state.history=snap.docs.map(d=>({id:d.id,...d.data()}));render()},e=>toast("Kayıt okunamadı: "+e.message))}async function addMeal({date,time,count,doseMl,note}){const ml=Math.round(count*doseMl*100)/100;await addDoc(recordsRef,{ml,count,doseMl,time,note:note||"",dayKey:date,createdAt:date+"T"+time+":00",createdBy:auth.currentUser.email,createdServerAt:serverTimestamp()});collapsedDays[date]=false}async function del(id){if(!confirm("Bu kaydı silmek istiyor musun?"))return;await deleteDoc(doc(db,"families",FAMILY_ID,"milkRecords",id));toast("Kayıt silindi.")}async function clearHistory(){if(!state.history.length){toast("Geçmiş zaten boş.");return}if(!confirm("Tüm kayıtları temizlemek istiyor musun?"))return;const snap=await getDocs(recordsRef);const batch=writeBatch(db);snap.docs.forEach(d=>batch.delete(d.ref));await batch.commit();collapsedDays={};toast("Tüm geçmiş silindi.")}
function changeDose(){state.doseMl=Number(doseEl.value);saveLocal();render();toast("Enjektör "+state.doseMl+" ml oldu.")}function addDose(){state.count++;state.lastTime=displayTime(new Date());saveLocal();render();try{navigator.vibrate&&navigator.vibrate(30)}catch{}}function undoDose(){if(state.count<=0){toast("Geri alınacak kayıt yok.");return}state.count--;state.lastTime=displayTime(new Date());saveLocal();render()}function resetCounter(){if(!state.count){toast("Sayaç zaten sıfır.");return}if(confirm("Mevcut sayacı sıfırlamak istiyor musun?")){state.count=0;state.lastTime="";saveLocal();render()}}function openNote(){if(!state.count){toast("Kaydedilecek süt yok.");return}modalMealInfo.innerText=totalMl()+" ml öğün kaydedilecek.";noteInput.value="";noteModal.className="modal-backdrop show";setTimeout(()=>noteInput.focus(),120)}function closeNote(){noteModal.className="modal-backdrop"}async function saveMeal(){const now=new Date(),date=isoDay(now),time=displayTime(now);await addMeal({date,time,count:state.count,doseMl:state.doseMl,note:noteInput.value.trim()});state.count=0;state.lastTime="";saveLocal();closeNote();render();toast("Öğün kaydedildi.")}function openManual(){const now=new Date();manualDate.value=isoDay(now);manualTime.value=displayTime(now);manualCount.value=1;manualDose.value=String(state.doseMl);manualNote.value="";manualModal.className="modal-backdrop show"}function closeManual(){manualModal.className="modal-backdrop"}async function saveManual(){const date=manualDate.value,time=manualTime.value,count=Number(manualCount.value),dose=Number(manualDose.value);if(!date||!time||!count){toast("Eksik bilgi var.");return}await addMeal({date,time,count,doseMl:dose,note:manualNote.value.trim()});closeManual();toast("Manuel kayıt eklendi.")}
$("loginBtn").onclick=async()=>{try{await signInWithEmailAndPassword(auth,email.value.trim(),password.value)}catch(e){toast("Giriş başarısız: "+e.message)}};$("logoutBtn").onclick=()=>signOut(auth);doseEl.onchange=changeDose;$("addBtn").onclick=addDose;$("undoBtn").onclick=undoDose;$("resetBtn").onclick=resetCounter;$("saveBtn").onclick=openNote;$("clearBtn").onclick=clearHistory;$("cancelNoteBtn").onclick=closeNote;$("confirmNoteBtn").onclick=saveMeal;$("manualBtn").onclick=openManual;$("cancelManualBtn").onclick=closeManual;$("confirmManualBtn").onclick=saveManual;noteModal.onclick=e=>{if(e.target===noteModal)closeNote()};manualModal.onclick=e=>{if(e.target===manualModal)closeManual()};loadLocal();onAuthStateChanged(auth,user=>{if(user){loginCard.classList.remove("show");mainCard.classList.add("show");userEmail.innerText=user.email;listen();render()}else{unsub&&unsub();loginCard.classList.add("show");mainCard.classList.remove("show")}});
